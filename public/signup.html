<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign up — Mobilions AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app-styles.css" />
</head>
<body class="auth-page">
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <div class="auth-card">
    <a href="/" class="auth-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="14" fill="url(#lg2)"/>
        <path d="M8 19L14 9L20 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="14" cy="9" r="2" fill="white"/>
        <defs><linearGradient id="lg2" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
      </svg>
      <span class="auth-logo-text">Mobilions<span class="auth-logo-ai"> AI</span></span>
    </a>

    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start with 12 AI agents — free for 7 days</p>

    <div id="errorBanner" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;font-size:14px;color:#f87171;margin-bottom:20px;"></div>

    <form id="signupForm">
      <div class="form-group">
        <label class="form-label" for="name">Full name</label>
        <input class="form-input" type="text" id="name" name="name" placeholder="Alex Johnson" required autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg auth-submit" id="submitBtn">
        <span id="btnText">Create account</span>
        <span id="btnSpinner" class="spinner" style="display:none;"></span>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>

  <script type="module">
    import { redirectIfAuthed, setSession } from "/auth.js";
    redirectIfAuthed();

    const form = document.getElementById("signupForm");
    const btn  = document.getElementById("submitBtn");
    const text = document.getElementById("btnText");
    const spin = document.getElementById("btnSpinner");
    const err  = document.getElementById("errorBanner");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.style.display = "none";
      text.textContent = "Creating account…";
      spin.style.display = "inline-block";
      btn.disabled = true;

      const name     = document.getElementById("name").value;
      const email    = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res  = await fetch("/api/auth/signup", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, password }) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Signup failed");
        setSession(data.token, data.user);
        window.location.href = "/dashboard";
      } catch (ex) {
        err.textContent = ex.message;
        err.style.display = "block";
        text.textContent = "Create account";
        spin.style.display = "none";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
